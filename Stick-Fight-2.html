<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Stick Fight</title>
  <style>
    :root{
      --bar-h: 48px;
      --bg: #111;
      --btn: #0b84ff;
      --txt: #fff;
    }
    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:#000;
      overflow:hidden;
    }
    .toolbar{
      height:var(--bar-h);
      display:flex;
      gap:.5rem;
      padding:.5rem;
      background:var(--bg);
      color:var(--txt);
      align-items:center;
      box-sizing:border-box;
      user-select:none;
    }
    .toolbar span{
      font-weight:600;
      white-space:nowrap;
    }
    button{
      background:var(--btn);
      color:var(--txt);
      border:0;
      padding:.5rem .8rem;
      border-radius:4px;
      cursor:pointer;
      font-weight:600;
    }
    button:active{ transform:translateY(1px); }
    .frame-wrapper{
      height:calc(100% - var(--bar-h));
      background:#000;
      display:flex;
    }
    iframe{
      border:0;
      width:100%;
      height:100%;
      display:block;
      background:#000;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span>Stick Fight</span>
    <button id="homeBtn" type="button">Home</button>
    <div style="flex:1"></div>
    <button id="fsBtn" type="button">Enter fullscreen</button>
  </div>

  <div class="frame-wrapper" id="frameWrapper">
    <iframe
      id="gameFrame"
      src="https://stickfight2.netlify.app/"
      allowfullscreen
      allow="fullscreen; autoplay; gamepad; clipboard-read; clipboard-write"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <script>
    const fsBtn = document.getElementById('fsBtn');
    const wrapper = document.getElementById('frameWrapper');
    const homeBtn = document.getElementById('homeBtn');

    function isFullscreen() {
      return !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.mozFullScreenElement ||
        document.msFullscreenElement
      );
    }

    function requestFull(element) {
      if (element.requestFullscreen) return element.requestFullscreen();
      if (element.webkitRequestFullscreen) return element.webkitRequestFullscreen();
      if (element.mozRequestFullScreen) return element.mozRequestFullScreen();
      if (element.msRequestFullscreen) return element.msRequestFullscreen();
    }

    function exitFull() {
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
      if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
      if (document.msExitFullscreen) return document.msExitFullscreen();
    }

    fsBtn.addEventListener('click', async () => {
      try {
        if (!isFullscreen()) {
          // Fullscreen the wrapper (more reliable than trying to fullscreen a cross-origin iframe)
          await requestFull(wrapper);
          fsBtn.textContent = 'Exit fullscreen';
        } else {
          await exitFull();
          fsBtn.textContent = 'Enter fullscreen';
        }
      } catch (e) {
        console.error('Fullscreen request failed', e);
      }
    });

    homeBtn.addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    function syncFsText() {
      fsBtn.textContent = isFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen';
    }

    document.addEventListener('fullscreenchange', syncFsText);
    document.addEventListener('webkitfullscreenchange', syncFsText);
    document.addEventListener('mozfullscreenchange', syncFsText);
    document.addEventListener('MSFullscreenChange', syncFsText);
  </script>
</body>
</html>
